# One-click deploy of the full interactive /app on Render's free tier.
# Uses the Dockerfile in this repo. Set OPENAI_API_KEY in the Render dashboard (not here).
services:
  - type: web
    name: thai-sarcasm-demo
    runtime: docker
    plan: free
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: OPENAI_API_KEY
        sync: false          # you set this secret in the Render dashboard
